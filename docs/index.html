<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Shell</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }

      nav {
        display: flex;
        gap: 4px;
        padding: 8px;
        background: #222;
        flex-wrap: wrap;
      }

      nav button {
        padding: 6px 14px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #333;
        color: #ccc;
        font-size: 13px;
        cursor: pointer;
      }
      nav button:hover {
        background: #444;
      }
      nav button.active {
        background: #fff;
        color: #222;
        border-color: #fff;
      }

      iframe {
        flex: 1;
        border: none;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <nav id="nav"></nav>
    <iframe id="frame"></iframe>

    <script>
      /* ============================================
     ADD YOUR APPS HERE
     Each entry: { name: "Button Label", src: "path/to/app.html" }
     ============================================ */
      const apps = [
        { name: "gpkg viewer", src: "gpkg_viewer.html" },
        { name: "Image Crop Tool", src: "grid_images_crop_synced.html" },
        // { name: "Yet Another",   src: "yet_another.html" },
      ];

      const nav = document.getElementById("nav");
      const frame = document.getElementById("frame");

      apps.forEach((app, i) => {
        const btn = document.createElement("button");
        btn.textContent = app.name;
        btn.onclick = () => load(i);
        nav.appendChild(btn);
      });

      function load(index) {
        frame.src = apps[index].src;
        nav
          .querySelectorAll("button")
          .forEach((b, i) => b.classList.toggle("active", i === index));
      }

      if (apps.length) load(0);
    </script>
  </body>
</html>
